prSections:
  - title: "Mine"
    filters: "is:open author:@me"
  - title: "Review Requested"
    filters: "is:open review-requested:@me"
  - title: "Involved"
    filters: "is:open involves:@me -author:@me"

issuesSections:
  - title: "My Issues"
    filters: "is:open author:@me"
  - title: "Assigned"
    filters: "is:open assignee:@me"
  - title: "Involved"
    filters: "is:open involves:@me -author:@me"

notificationsSections:
  - title: "All"
    filters: ""
  - title: "Created"
    filters: "reason:author"
  - title: "Participating"
    filters: "reason:participating"
  - title: "Mentioned"
    filters: "reason:mention"
  - title: "Review Requested"
    filters: "reason:review-requested"
  - title: "Assigned"
    filters: "reason:assign"
  - title: "Subscribed"
    filters: "reason:subscribed"
  - title: "Team Mentioned"
    filters: "reason:team-mention"

pager:
  diff: less
showAuthorIcons: true
smartFilteringAtLaunch: true

defaults:
  view: prs
  refetchIntervalMinutes: 5
  layout:
    prs:
      repoName:
        grow: true,
        width: 10
        hidden: false
      base:
        hidden: true
  preview:
    open: false
    width: 70
  prsLimit: 20
  issuesLimit: 20
  notificationsLimit: 20

keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}}; lazygit
  prs:
    - key: y
      name: copy branch
      command: >
        echo -n "{{.HeadRefName}}" | pbcopy
    - key: W
      name: worktree
      command: >
        tmux new-window -n "{{.HeadRefName}}"
        "git fetch origin {{.HeadRefName}} && wt switch {{.HeadRefName}} -x 'exec $SHELL'"
