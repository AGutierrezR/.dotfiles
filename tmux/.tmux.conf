# ═════════════════════════════════════════════════════════════════════════
# Configuration
# ═════════════════════════════════════════════════════════════════════════

set-option -sa terminal-overrides ",xterm*:Tc"

# Don't detach when killing a session, just close the window
set-option -g detach-on-destroy off

#increase history scrollback per-pane
set-option -g history-limit 30000

# Improve colors
set -g default-terminal "xterm-256color"

# Enable mouse to resize windows and select tabs
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is removed.
set-option -g renumber-windows on

# Moving status bar to top
set-option -g status-position top

# set vi mode
set-window-option -g mode-keys vi

# Change tmux-resurrect keybindings
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Enable continuum restore on startup
set -g @continuum-restore 'on'

# ═════════════════════════════════════════════════════════════════════════
# Key Bindings
# ═════════════════════════════════════════════════════════════════════════

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

# Change leader key
set -g prefix C-a

# Bind r to source file shortcut (prefix + r)
unbind r
bind r source-file ~/.tmux.conf \; display "Tmux.conf reloaded!"

# Unbinds
unbind C-z # Suspend tmux client
unbind t # Unbind default 't' keybinding for display time
unbind q # Unbind default 'q' keybinding for displaying pane numbers
unbind m # Unbind default 'm' keybinding for marking panes
unbind p # Unbind default 'p' keybinding for previous window

# New binds
bind -N "Second brain" b run-shell  "tmux-vimwiki"

# Keybindings for custom scripts
bind -N "Sessionizer" f run-shell "tmux neww tmux-sessionizer"
bind -N "Create session from worktree" W run-shell "tmux neww tmux-worktree"
bind -N "Command picker" p display-popup -E -w 60% -h 60% "tmux-commands-picker"

bind -N "LazyGit" g new-window -n lazygit -c "#{pane_current_path}" "lazygit"
bind -N "Clone git repo" G display-popup -E -w 30% -h 30% "tmux-clone-repo"
bind -N "Yazi, File Explorer" C-e new-window -c "#{pane_current_path}" -n " 󰇥 "  yazi

# Bind 'M-l' to load the dev window from tmuxifier
bind M-l run-shell "tmuxifier load-window dev"

# Create bottom pane for terminal (replace time keybinding)
# bind t split-window -p 15 -v
bind t run-shell "tpane"
# Create left pane for opencode
unbind o
bind o run-shell "opane"

bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh" # quick floating terminal
unbind m
bind m display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "rmpc" # Music

# from https://github.com/Sin-cy/dotfiles/blob/4a7de56b718bda9c6eb53d1ea5092b0147943f27/tmux/.config/tmux/tmux.conf#L78
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"            z  "display-popup -w 85% -h 85% -E 'nvim ~/.zshrc'" \
    ".zprofile"         p  "display-popup -w 85% -h 85% -E 'nvim ~/.zprofile'" \
    "mise"              m  "display-popup -w 85% -h 85% -E 'nvim ~/.config/mise/config.toml'" \
    ".tmux.conf"        t  "display-popup -w 85% -h 85% -E 'nvim ~/.tmux.conf'" \
    "quit"              q  ""

# Chose-tree keybindings
# ═════════════════════════════════════════════════════════════════════════
# When pressing prefix+s to list sessions, I want them sorted by time
# That way my latest used sessions show at the top of the list
# Credit: video below by linkarzu
# https://www.youtube.com/watch?v=sWSj4biaPO0
#
bind s choose-tree -Zs -O time -F "#{session_windows}"

# # Bind 'd' to perform the 'x' action when in choose-tree mode
# # In other words, this allows you to close sessions with "d" when in the session
# # navigator "choose-tree" that comes up with prefix+s
bind -n d if -F '#{==:#{pane_mode},tree-mode}' 'send x' 'send d'

# Use 'd' instead of 't' to tag panes that I want to delete
# bind -n d if -F '#{==:#{pane_mode},tree-mode}' 'send t' 'send d'

# Use 'D' instead of 'X' to delete all tagged panes
bind -n D if -F '#{==:#{pane_mode},tree-mode}' 'send X' 'send D'


# Pane control keybindings
# ═════════════════════════════════════════════════════════════════════════
bind x confirm-before -p "Kill pane? (y/n)" "kill-pane"
bind X confirm-before -p "Kill other panes? (y/n)" "kill-pane -a"

# Change keybinding for changing pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# Window control keybindings
# ═════════════════════════════════════════════════════════════════════════
bind c new-window -c "#{pane_current_path}"
bind q confirm-before -p "kill-window #W? (y/n)" "kill-window"
bind Q confirm-before -p "Kill other windows? (y/n)" "kill-window -a"


# swap window to left or right
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1


# Session control keybindings
# ═════════════════════════════════════════════════════════════════════════
# Bind 'M-d' to kill the current session and display a message
bind M-d kill-session -a \; display "Other sessions closed!"

# switch between two most recently used sessions
bind C-b switch-client -l


# Vi mode keybindings
# ═════════════════════════════════════════════════════════════════════════
# Change the keybinding to enter copy mode from 'prefix + [' to 'prefix + v'
unbind v
bind v copy-mode

# Bind Esc to exit copy-mode
bind-key -T copy-mode-vi 'Escape' send -X cancel

# keybindings for copy-mode (vim style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Search up mode
# from https://github.com/dlvhdr/dotfiles/blob/b7b6523cad7b795b6eae9f1551522dbfc5f19051/tmux/tmux.conf#L92
bind C-f copy-mode \; command-prompt -p "(search up)" "send -X search-backward \"%%%\""

# Find test error messages quickly (edit if necessary)
bind-key -T copy-mode-vi d  send-keys -X search-forward '❌'\; send-keys -X clear-selection\; 
bind-key -T copy-mode-vi u  send-keys -X search-backward '❌'\; send-keys -X clear-selection\; 


# Misc
# ═════════════════════════════════════════════════════════════════════════

# search sessions (fzf is required)
# ctrl-d to delete selected session, enter to jump to session
bind C-s display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header 'jump-to-session (ctrl-d: delete)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {})+reload(tmux list-sessions -F \"#{?session_attached,,#{session_name}}\" | sed \"/^\$/d\")' |\
    xargs tmux switch-client -t"

# search windows in current session (fzf is required)
# ctrl-d to delete selected window, enter to jump to window
bind C-w display-popup -E "\
    tmux list-windows -F '#{window_index} #{window_name}' |\
    sed '/^$/d' |\
    fzf --reverse --header 'jump-to-window (ctrl-d: delete)' \
        --bind 'ctrl-d:execute(tmux kill-window -t {1})+reload(tmux list-windows -F \"#{window_index} #{window_name}\" | sed \"/^\$/d\")' |\
    cut -d ' ' -f 1 |\
    xargs tmux select-window -t"


# unbind 1
# bind-key -r 1 run-shell "tmux neww tmux-vimwiki"
# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

set -g status-style "bg=default,fg=default"
set -g status-left ""
set -g status-right "#[fg=blue]#{?client_prefix,PREFIX ,}#[fg=black,bg=blue,bold] #S "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# ═════════════════════════════════════════════════════════════════════════
# Plugins
# ═════════════════════════════════════════════════════════════════════════

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'
